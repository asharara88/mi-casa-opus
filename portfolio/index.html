<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Casa — Portfolio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F7F7F5;
  --white: #FFFFFF;
  --text: #111111;
  --sub: #666666;
  --border: #E0E0E0;
  --gold: #B8962E;
  --green: #2D7A5A;
  --red: #A03030;
  --amber: #9A6F20;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

/* HEADER */
header {
  background: #111;
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo { height: 26px; }
.live { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #888; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #3D9E76; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* STATS */
.stats {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex;
  gap: 0;
}
.stat {
  padding: 20px 32px 20px 0;
  margin-right: 32px;
  border-right: 1px solid var(--border);
}
.stat:last-child { border-right: none; }
.stat-n { font-size: 26px; font-weight: 600; color: var(--text); }
.stat-l { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; margin-top: 2px; }

/* FILTERS */
.filters {
  padding: 20px 32px;
  display: flex;
  gap: 8px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.filter {
  font-size: 12px;
  padding: 6px 16px;
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--sub);
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.filter:hover { border-color: #999; color: var(--text); }
.filter.on { background: var(--text); color: #fff; border-color: var(--text); }

/* MAIN */
.main { max-width: 1280px; margin: 0 auto; padding: 28px 32px; }

.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--sub);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* TABLE layout for listings */
.listings { margin-bottom: 40px; }

.listing-row {
  background: var(--white);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  display: grid;
  grid-template-columns: 180px 1fr auto auto;
  align-items: center;
  gap: 0;
  transition: border-color .15s;
}
.listing-row:hover { border-color: #bbb; }

.row-visual {
  height: 100px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}
.row-visual-bg {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.bg-villa { background: #1a2230; }
.bg-apt { background: #1a2028; }
.bg-plot { background: #1a2018; }
.bg-farm { background: #1c2014; }

.row-body { padding: 16px 20px; }
.row-name { font-size: 16px; font-weight: 600; color: var(--text); }
.row-unit { font-size: 11px; color: var(--sub); margin-bottom: 4px; }
.row-desc { font-size: 12px; color: var(--sub); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 420px; }
.row-chips { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.chip { font-size: 11px; color: var(--sub); background: var(--bg); padding: 2px 8px; border: 1px solid var(--border); }

.row-status { padding: 0 20px; text-align: center; }
.badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 4px 10px; }
.b-available { background: #EAF5EF; color: var(--green); border: 1px solid #C0E0D0; }
.b-booked { background: #F0F0F0; color: #777; border: 1px solid #DDD; }
.b-off_market { background: #FAEAEA; color: var(--red); border: 1px solid #E8C0C0; }
.b-june2026 { background: #FDF5E0; color: var(--amber); border: 1px solid #E8D5A0; }

.row-price { padding: 0 24px; text-align: right; white-space: nowrap; }
.price-num { font-size: 18px; font-weight: 700; color: var(--text); }
.price-sub { font-size: 11px; color: var(--sub); margin-top: 2px; }

.warn-bar {
  grid-column: 1/-1;
  background: #FFF5F5;
  border-top: 1px solid #F0CECE;
  padding: 8px 20px;
  font-size: 11px;
  color: var(--red);
}

/* Loading */
.loading { padding: 80px; text-align: center; color: var(--sub); }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }

/* Footer */
footer {
  border-top: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--white);
}
.footer-logo { height: 20px; filter: brightness(0); opacity: .4; }
.footer-text { font-size: 11px; color: var(--sub); }

@media (max-width: 700px) {
  .listing-row { grid-template-columns: 80px 1fr; grid-template-rows: auto auto; }
  .row-visual { height: 80px; }
  .row-status, .row-price { padding: 0 12px 12px; }
  .row-status { grid-column: 2; }
  .row-price { grid-column: 1/-1; text-align: left; padding-left: 100px; }
  header, .stats, .filters, .main, footer { padding-left: 16px; padding-right: 16px; }
  .stats { flex-wrap: wrap; }
  .stat { padding: 14px 20px 14px 0; margin-right: 20px; }
}
</style>
</head>
<body>

<header>
  <img class="logo" src="https://micasa.ae/images/logo_msa_white.svg" alt="Mi Casa">
  <div class="live"><div class="live-dot"></div><span id="updated">Live</span></div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">Properties</div></div>
  <div class="stat"><div class="stat-n" id="s-sale">—</div><div class="stat-l">For Sale</div></div>
  <div class="stat"><div class="stat-n" id="s-rent">—</div><div class="stat-l">For Rent</div></div>
  <div class="stat"><div class="stat-n" id="s-val">—</div><div class="stat-l">Portfolio Value</div></div>
</div>

<div class="filters">
  <button class="filter on" data-f="all">All</button>
  <button class="filter" data-f="sale">For Sale</button>
  <button class="filter" data-f="rent">For Rent</button>
  <button class="filter" data-f="available">Available</button>
</div>

<div class="main">
  <div id="content"><div class="loading"><div class="spinner"></div>Loading…</div></div>
</div>

<footer>
  <img class="footer-logo" src="https://micasa.ae/images/logo_msa_white.svg" alt="Mi Casa">
  <div class="footer-text">Mi Casa Real Estate LLC · Confidential</div>
</footer>

<script>
const SB = 'https://dhwppkevuquwtavvqaan.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRod3Bwa2V2dXF1d3RhdnZxYWFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTM3MzYsImV4cCI6MjA5MTI4OTczNn0.5YJVwbA_HFziSr1WPcRRmq_FW5NR-XLXLUURwrTcvac';
let all = [];

function price(n, isRent) {
  const v = parseFloat(n);
  if (!v) return '—';
  if (v >= 1e6) return 'AED ' + (v/1e6).toFixed(2).replace(/\.?0+$/, '') + 'M';
  if (v >= 1e3) return 'AED ' + Math.round(v/1e3) + 'K';
  return 'AED ' + v.toLocaleString();
}

function bigNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(0) + 'M';
  return n.toLocaleString();
}

function bg(name, desc) {
  const s = (name + ' ' + (desc||'')).toLowerCase();
  if (/farm|bahyah/.test(s)) return 'bg-farm';
  if (/plot|nareel|w32/.test(s)) return 'bg-plot';
  if (/apt|apartment|avani|limestone|fahid/.test(s)) return 'bg-apt';
  return 'bg-villa';
}

function icon(cls) {
  return { 'bg-villa': '🏡', 'bg-apt': '🏢', 'bg-plot': '📐', 'bg-farm': '🌿' }[cls] || '🏠';
}

function statusLabel(s) {
  return { available:'Available', booked:'Tenanted', off_market:'Off Market', june2026:'June 2026' }[s] || s;
}

function warn(notes) {
  return notes && (notes.includes('LEGAL RESTRICTION') || notes.includes('يمنع'));
}

function row(l) {
  const isRent = l.listing_type === 'rent';
  const bgCls = bg(l.name, l.description);
  let chips = '';
  if (l.bedrooms) chips += `<span class="chip">${l.bedrooms} BR</span>`;
  if (l.area_sqft) {
    const a = parseInt(l.area_sqft);
    chips += `<span class="chip">${a > 5000 ? (a/1000).toFixed(0)+'k' : a.toLocaleString()} sqft</span>`;
  }
  if (l.location) chips += `<span class="chip">${l.location.split(',')[0]}</span>`;

  return `
  <div class="listing-row">
    <div class="row-visual">
      <div class="row-visual-bg ${bgCls}">${icon(bgCls)}</div>
    </div>
    <div class="row-body">
      <div class="row-unit">${l.listing_type === 'rent' ? 'FOR RENT' : 'FOR SALE'}${l.unit ? ' · Unit ' + l.unit : ''}</div>
      <div class="row-name">${l.name}</div>
      <div class="row-desc">${l.description || l.location || ''}</div>
      ${chips ? `<div class="row-chips">${chips}</div>` : ''}
    </div>
    <div class="row-status">
      <span class="badge b-${l.status}">${statusLabel(l.status)}</span>
    </div>
    <div class="row-price">
      <div class="price-num">${price(l.price)}</div>
      <div class="price-sub">${isRent ? 'per year' : 'asking price'}</div>
    </div>
    ${warn(l.notes) ? '<div class="warn-bar">⚠ Legal restriction on title — cannot be marketed</div>' : ''}
  </div>`;
}

function render(list) {
  const sales = list.filter(l => l.listing_type === 'sale');
  const rents = list.filter(l => l.listing_type === 'rent');
  let html = '';
  if (sales.length) {
    html += `<div class="section-label">For Sale — ${sales.length}</div>`;
    html += `<div class="listings">${sales.map(row).join('')}</div>`;
  }
  if (rents.length) {
    html += `<div class="section-label">For Rent — ${rents.length}</div>`;
    html += `<div class="listings">${rents.map(row).join('')}</div>`;
  }
  if (!list.length) html = '<div class="loading">No listings match this filter.</div>';
  document.getElementById('content').innerHTML = html;
}

function filter(f) {
  document.querySelectorAll('.filter').forEach(b => b.classList.toggle('on', b.dataset.f === f));
  let list = all;
  if (f === 'sale') list = all.filter(l => l.listing_type === 'sale');
  else if (f === 'rent') list = all.filter(l => l.listing_type === 'rent');
  else if (f === 'available') list = all.filter(l => l.status === 'available');
  render(list);
}

document.querySelector('.filters').addEventListener('click', e => {
  if (e.target.dataset.f) filter(e.target.dataset.f);
});

async function load() {
  try {
    const r = await fetch(`${SB}/rest/v1/listings?select=*&order=listing_type,price.desc`, {
      headers: { apikey: KEY, Authorization: 'Bearer ' + KEY }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    all = await r.json();

    const sales = all.filter(l => l.listing_type === 'sale' && l.status !== 'off_market');
    document.getElementById('s-total').textContent = all.length;
    document.getElementById('s-sale').textContent = all.filter(l => l.listing_type === 'sale').length;
    document.getElementById('s-rent').textContent = all.filter(l => l.listing_type === 'rent').length;
    document.getElementById('s-val').textContent = 'AED ' + bigNum(sales.reduce((s, l) => s + parseFloat(l.price||0), 0));
    document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });

    render(all);
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading">Failed to load: ${e.message}</div>`;
    console.error(e);
  }
}

load();
</script>
</body>
</html>
