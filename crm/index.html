<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Casa CRM</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0C0C0C; --surface:#111; --surface2:#161616; --border:#1e1e1e;
  --text:#F0EDE8; --muted:#666; --sub:#444;
  --gold:#D4A853; --green:#00C896; --red:#E05252;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; max-width:430px; margin:0 auto; display:flex; flex-direction:column; font-size:14px; }
::-webkit-scrollbar { width:0; }

/* HEADER */
.header { background:#0A0A0A; border-bottom:1px solid var(--border); padding:14px 20px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.header img { height:26px; filter:brightness(0) invert(1); opacity:.9; }
.live { font-size:11px; color:var(--green); display:flex; align-items:center; gap:6px; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* TABS */
.tabs { display:flex; padding:10px 20px 0; gap:4px; background:#0A0A0A; flex-shrink:0; }
.tab { flex:1; padding:8px 4px; border-radius:8px 8px 0 0; border:none; cursor:pointer; font-size:11px; font-weight:600; font-family:inherit; transition:all .2s; }
.tab.on { background:#1e1e1e; color:var(--gold); }
.tab.off { background:transparent; color:var(--muted); }

/* SUBTABS */
.subtabs { display:flex; padding:10px 20px 0; gap:4px; flex-shrink:0; }
.subtab { flex:1; padding:7px; border:none; cursor:pointer; font-size:12px; font-weight:600; font-family:inherit; background:transparent; transition:all .2s; border-bottom:2px solid transparent; }
.subtab.on { color:var(--gold); border-bottom-color:var(--gold); }
.subtab.off { color:var(--muted); }

/* SCROLL BODY */
.body { flex:1; overflow-y:auto; padding:14px 20px 24px; }

/* STATS ROW */
.stats-row { display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; }
.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px 12px; min-width:fit-content; flex-shrink:0; }
.stat-n { font-size:17px; font-weight:700; color:var(--gold); }
.stat-n.green { color:var(--green); }
.stat-l { font-size:10px; color:var(--sub); margin-top:1px; }

/* CARDS */
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:10px; cursor:pointer; display:flex; gap:12px; align-items:flex-start; position:relative; transition:border-color .2s; }
.card:hover { border-color:#333; }
.card-bar { position:absolute; top:0; left:0; width:3px; height:100%; border-radius:12px 0 0 12px; }
.card-thumb { width:56px; height:56px; border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--surface2); border:1px dashed #2a2a2a; display:flex; align-items:center; justify-content:center; font-size:20px; margin-left:4px; }
.card-thumb img, .card-thumb video { width:100%; height:100%; object-fit:cover; }
.card-body { flex:1; min-width:0; }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:3px; }
.card-name { font-size:15px; font-weight:600; color:var(--text); }
.card-unit { font-size:10px; color:var(--muted); font-family:monospace; margin-left:4px; }
.card-price { font-size:14px; font-weight:700; color:var(--gold); white-space:nowrap; }
.card-desc { font-size:12px; color:#777; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-foot { display:flex; justify-content:space-between; align-items:center; }
.card-loc { font-size:10px; color:var(--sub); }
.badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; border:1px solid; text-transform:uppercase; letter-spacing:.06em; display:inline-block; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:100; overflow-y:auto; padding:16px; display:none; }
.modal-overlay.open { display:block; }
.modal { background:var(--surface); border-radius:16px; border:1px solid #2a2a2a; max-width:430px; margin:0 auto; overflow:hidden; }
.modal-header { padding:16px 18px 12px; background:#141414; border-bottom:1px solid var(--border); }
.modal-name { font-size:18px; font-weight:600; }
.modal-desc { font-size:12px; color:#777; margin-top:2px; }
.modal-loc { font-size:10px; color:var(--sub); margin-top:3px; }
.modal-price { font-size:16px; font-weight:700; color:var(--gold); }
.modal-body { padding:16px; display:flex; flex-direction:column; gap:14px; }
.label { font-size:10px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }
.input { width:100%; background:var(--bg); border:1px solid #2a2a2a; border-radius:8px; padding:9px 12px; color:var(--text); font-size:13px; font-family:inherit; outline:none; }
textarea.input { resize:vertical; line-height:1.6; }

/* STATUS PILLS */
.status-pills { display:flex; gap:5px; flex-wrap:wrap; }
.status-pill { padding:5px 10px; border-radius:6px; border:1px solid; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; background:transparent; transition:all .15s; }

/* GALLERY */
.gallery { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.gallery-item { position:relative; border-radius:8px; overflow:hidden; aspect-ratio:1; background:var(--surface2); }
.gallery-item img, .gallery-item video { width:100%; height:100%; object-fit:cover; }
.gallery-del { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.75); border:none; border-radius:4px; color:var(--text); font-size:10px; cursor:pointer; padding:2px 6px; }
.gallery-empty { font-size:12px; color:var(--sub); text-align:center; padding:14px 0; }

/* UPLOAD BTN */
.upload-btn { width:100%; padding:10px; background:var(--bg); border:2px dashed #2a2a2a; border-radius:10px; color:var(--muted); font-size:12px; cursor:pointer; font-family:inherit; transition:all .2s; }
.upload-btn:hover { border-color:#444; color:#999; }

/* BUTTONS */
.btn { padding:9px 16px; border:none; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
.btn-primary { background:var(--gold); color:#0C0C0C; }
.btn-primary:disabled { opacity:.5; cursor:default; }
.btn-ghost { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.btn-row { display:flex; gap:8px; }
.btn-row .btn { flex:1; }

/* ACTIVITY */
.act-types { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
.act-pill { padding:5px 10px; border-radius:6px; border:1px solid #2a2a2a; font-size:11px; cursor:pointer; font-family:inherit; background:transparent; color:var(--muted); transition:all .15s; }
.act-pill.on { border-color:var(--gold); color:var(--gold); background:rgba(212,168,83,.1); }
select.input { appearance:none; }
.act-entry { background:var(--surface); border:1px solid var(--border); border-left:3px solid rgba(212,168,83,.3); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
.act-entry-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.act-type-label { font-size:11px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:.07em; }
.act-listing { font-size:11px; color:var(--muted); margin-left:6px; }
.act-date { font-size:10px; color:var(--sub); }
.act-body { font-size:13px; color:#B0ACA6; line-height:1.6; }

/* CLIENT */
.client-card { background:var(--surface); border:1px solid rgba(212,168,83,.2); border-radius:12px; padding:16px; margin-bottom:10px; }
.client-avatar { width:48px; height:48px; border-radius:12px; background:#1A1208; border:1px solid rgba(212,168,83,.3); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:var(--gold); flex-shrink:0; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.mini-stat { background:var(--bg); border-radius:8px; padding:10px 12px; }
.mini-stat-n { font-size:15px; font-weight:700; color:var(--gold); }
.mini-stat-l { font-size:10px; color:var(--sub); margin-top:2px; }

.loading { text-align:center; padding:48px 0; color:var(--muted); }
.error { color:var(--red); font-size:12px; text-align:center; padding:8px; }
</style>
</head>
<body>

<div class="header">
  <img src="https://micasa.ae/images/logo_msa_white.svg" alt="Mi Casa">
  <div class="live"><div class="live-dot"></div>Live</div>
</div>

<div class="tabs">
  <button class="tab on" onclick="switchTab('listings')">Listings</button>
  <button class="tab off" onclick="switchTab('client')">Client</button>
  <button class="tab off" onclick="switchTab('activity')">Activity</button>
</div>

<!-- LISTINGS TAB -->
<div id="tab-listings" class="body">
  <div class="subtabs">
    <button class="subtab on" onclick="switchSub('rent')">For Rent</button>
    <button class="subtab off" onclick="switchSub('sale')">For Sale</button>
  </div>
  <div style="margin-top:14px" id="stats-row"></div>
  <div id="listings-list"><div class="loading">Loading…</div></div>
</div>

<!-- CLIENT TAB -->
<div id="tab-client" class="body" style="display:none">
  <div id="client-view"><div class="loading">Loading…</div></div>
</div>

<!-- ACTIVITY TAB -->
<div id="tab-activity" class="body" style="display:none">
  <div id="act-form"></div>
  <div id="act-log"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-inner"></div>
</div>

<input type="file" id="file-input" multiple accept="image/*,video/*" style="display:none">

<script>
const SB  = 'https://dhwppkevuquwtavvqaan.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRod3Bwa2V2dXF1d3RhdnZxYWFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MTM3MzYsImV4cCI6MjA5MTI4OTczNn0.5YJVwbA_HFziSr1WPcRRmq_FW5NR-XLXLUURwrTcvac';
const BUCKET = 'listing-media';

const HDR = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };

async function api(path, opts={}) {
  const r = await fetch(SB + path, { headers: HDR, ...opts });
  if (!r.ok) throw new Error(await r.text());
  const t = await r.text();
  return t ? JSON.parse(t) : null;
}

// Upload file to Supabase Storage via REST
async function uploadFile(listingId, file) {
  const ext  = file.name.split('.').pop();
  const path = listingId + '/' + Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
  const r = await fetch(SB + '/storage/v1/object/' + BUCKET + '/' + path, {
    method: 'POST',
    headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': file.type },
    body: file
  });
  if (!r.ok) throw new Error('Upload failed: ' + await r.text());
  const publicUrl = SB + '/storage/v1/object/public/' + BUCKET + '/' + path;
  await api('/rest/v1/listing_media', {
    method: 'POST',
    headers: { ...HDR, 'Prefer': 'return=minimal' },
    body: JSON.stringify({ listing_id: listingId, url: publicUrl, storage_path: path, media_type: file.type.startsWith('video') ? 'video' : 'image' })
  });
  return publicUrl;
}

const STATUSES = {
  available:  { label:'Available',  color:'#00C896' },
  booked:     { label:'Tenanted',   color:'#888' },
  sold:       { label:'Sold',       color:'#E05252' },
  june2026:   { label:'Jun 2026',   color:'#D4A853' },
  off_market: { label:'Off Market', color:'#555' },
};

function fmtP(p, t) {
  const v = parseFloat(p);
  if (!v) return '—';
  if (v >= 1e6) return 'AED ' + (v/1e6).toFixed(2).replace(/\.?0+$/,'') + 'M' + (t==='rent'?'/yr':'');
  return 'AED ' + Math.round(v/1000) + 'K' + (t==='rent'?'/yr':'');
}
function fmtBig(n) {
  if (n>=1e6) return 'AED ' + (n/1e6).toFixed(0) + 'M';
  return 'AED ' + n.toLocaleString();
}

let allListings = [], allClient = null, currentSub = 'rent', currentTab = 'listings';
let modalListingId = null, modalCurrentStatus = null;

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    const [listings, client] = await Promise.all([
      api('/rest/v1/listings?select=*,listing_media(*)&order=name'),
      api('/rest/v1/clients?select=*&name=eq.Makarem%20LLC&limit=1')
    ]);
    allListings = listings.map(l => ({ ...l, media: l.listing_media || [] }));
    allClient = client?.[0] || null;
    renderListings();
    renderClient();
    renderActivityForm();
    loadActivityLog();
  } catch(e) {
    document.getElementById('listings-list').innerHTML = '<div class="error">Load error: ' + e.message + '</div>';
  }
}

// ── LISTINGS ──────────────────────────────────────────────────────────────────
function renderListings() {
  const list = allListings.filter(l => l.listing_type === currentSub);
  const avail = list.filter(l => l.status === 'available').length;
  const val   = list.reduce((s,l) => s + parseFloat(l.price||0), 0);

  document.getElementById('stats-row').innerHTML = `
    <div class="stats-row">
      <div class="stat-box"><div class="stat-n">${list.length}</div><div class="stat-l">Properties</div></div>
      <div class="stat-box"><div class="stat-n green">${avail}</div><div class="stat-l">Available</div></div>
      <div class="stat-box"><div class="stat-n">${fmtBig(val)}</div><div class="stat-l">${currentSub==='rent'?'Annual':'Portfolio'}</div></div>
    </div>`;

  if (!list.length) {
    document.getElementById('listings-list').innerHTML = '<div class="loading">No listings</div>';
    return;
  }

  document.getElementById('listings-list').innerHTML = list.map(l => {
    const s = STATUSES[l.status] || { label:l.status, color:'#555' };
    const thumb = l.media?.[0];
    const thumbHtml = thumb
      ? (thumb.media_type==='video'
          ? `<video src="${thumb.url}" style="width:100%;height:100%;object-fit:cover" muted></video>`
          : `<img src="${thumb.url}" alt="">`)
      : '🏡';
    return `
      <div class="card" onclick="openModal('${l.id}')">
        <div class="card-bar" style="background:${s.color};opacity:${l.status==='booked'?0.3:0.9}"></div>
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-top">
            <div class="card-name">${l.name}${l.unit?`<span class="card-unit">#${l.unit}</span>`:''}</div>
            <div class="card-price">${fmtP(l.price,l.listing_type)}</div>
          </div>
          <div class="card-desc">${l.description||''}</div>
          <div class="card-foot">
            <div class="card-loc">📍 ${l.location||''}</div>
            <span class="badge" style="color:${s.color};border-color:${s.color}">${s.label}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
async function openModal(id) {
  const l = allListings.find(x => x.id===id);
  if (!l) return;
  modalListingId = id;
  modalCurrentStatus = l.status;

  const s = STATUSES[l.status] || { label:l.status, color:'#555' };

  const statusPills = Object.entries(STATUSES).map(([k,v]) =>
    `<button class="status-pill" data-s="${k}" style="color:${v.color};border-color:${k===l.status?v.color:'#2a2a2a'};background:${k===l.status?v.color+'20':'transparent'}" onclick="pickStatus('${k}')">${v.label}</button>`
  ).join('');

  const mediaHtml = l.media?.length
    ? l.media.map(m => `
        <div class="gallery-item">
          ${m.media_type==='video' ? `<video src="${m.url}" controls></video>` : `<img src="${m.url}" alt="">`}
          <button class="gallery-del" onclick="deleteMedia('${m.id}','${m.storage_path||''}')">✕</button>
        </div>`).join('')
    : `<div class="gallery-empty" style="grid-column:1/-1">No photos yet</div>`;

  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div>
          <div class="modal-name">${l.name}${l.unit?`<span style="font-size:11px;color:var(--muted);font-family:monospace;margin-left:8px">#${l.unit}</span>`:''}</div>
          <div class="modal-desc">${l.description||''}</div>
          <div class="modal-loc">📍 ${l.location||''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="modal-price">${fmtP(l.price,l.listing_type)}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.06em">${l.listing_type==='rent'?'For Rent':'For Sale'}</div>
        </div>
      </div>
    </div>
    <div class="modal-body">
      <div>
        <div class="label">Status</div>
        <div class="status-pills">${statusPills}</div>
      </div>
      <div>
        <div class="label">Photos & Videos</div>
        <div class="gallery" id="modal-gallery">${mediaHtml}</div>
        <div style="margin-top:8px">
          <button class="upload-btn" onclick="triggerUpload()">📎 Upload photos or videos</button>
          <div id="upload-progress" style="font-size:11px;color:var(--gold);text-align:center;padding:4px 0;display:none"></div>
        </div>
      </div>
      <div>
        <div class="label">Internal Notes</div>
        <textarea class="input" id="modal-notes" rows="3" placeholder="Notes…">${l.notes||''}</textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="save-btn" onclick="saveModal()">Save Changes</button>
      </div>
    </div>`;

  document.getElementById('modal').classList.add('open');

  // wire up file input
  document.getElementById('file-input').onchange = handleUpload;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalListingId = null;
}

function pickStatus(s) {
  modalCurrentStatus = s;
  document.querySelectorAll('.status-pill').forEach(el => {
    const k = el.dataset.s;
    const v = STATUSES[k];
    el.style.color = v.color;
    el.style.borderColor = k===s ? v.color : '#2a2a2a';
    el.style.background  = k===s ? v.color+'20' : 'transparent';
  });
}

async function saveModal() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const notes = document.getElementById('modal-notes').value;
  await api(`/rest/v1/listings?id=eq.${modalListingId}`, {
    method: 'PATCH',
    headers: { ...HDR, 'Prefer': 'return=minimal' },
    body: JSON.stringify({ status: modalCurrentStatus, notes })
  });
  closeModal();
  await loadAll();
}

function triggerUpload() {
  document.getElementById('file-input').click();
}

async function handleUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length || !modalListingId) return;
  const prog = document.getElementById('upload-progress');
  prog.style.display = 'block';
  for (const f of files) {
    prog.textContent = 'Uploading ' + f.name + '…';
    try { await uploadFile(modalListingId, f); } catch(err) { prog.textContent = 'Error: ' + err.message; }
  }
  prog.textContent = 'Done ✓';
  e.target.value = '';
  setTimeout(() => { prog.style.display='none'; }, 1500);
  // reload media for this listing
  const media = await api(`/rest/v1/listing_media?listing_id=eq.${modalListingId}&select=*&order=created_at`);
  const gal = document.getElementById('modal-gallery');
  if (gal) {
    gal.innerHTML = media?.length
      ? media.map(m => `
          <div class="gallery-item">
            ${m.media_type==='video'?`<video src="${m.url}" controls></video>`:`<img src="${m.url}" alt="">`}
            <button class="gallery-del" onclick="deleteMedia('${m.id}','${m.storage_path||''}')">✕</button>
          </div>`).join('')
      : '<div class="gallery-empty" style="grid-column:1/-1">No photos yet</div>';
  }
  // update in allListings
  const idx = allListings.findIndex(l => l.id===modalListingId);
  if (idx>-1) allListings[idx].media = media || [];
  renderListings();
}

async function deleteMedia(id, storagePath) {
  if (!confirm('Delete this photo?')) return;
  if (storagePath) {
    await fetch(SB + '/storage/v1/object/' + BUCKET + '/' + storagePath, {
      method: 'DELETE', headers: { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY }
    });
  }
  await api(`/rest/v1/listing_media?id=eq.${id}`, { method:'DELETE', headers: { ...HDR, 'Prefer':'return=minimal' } });
  const media = await api(`/rest/v1/listing_media?listing_id=eq.${modalListingId}&select=*&order=created_at`);
  const gal = document.getElementById('modal-gallery');
  if (gal) {
    gal.innerHTML = media?.length
      ? media.map(m => `
          <div class="gallery-item">
            ${m.media_type==='video'?`<video src="${m.url}" controls></video>`:`<img src="${m.url}" alt="">`}
            <button class="gallery-del" onclick="deleteMedia('${m.id}','${m.storage_path||''}')">✕</button>
          </div>`).join('')
      : '<div class="gallery-empty" style="grid-column:1/-1">No photos yet</div>';
  }
}

// ── CLIENT ────────────────────────────────────────────────────────────────────
function renderClient() {
  const c = allClient;
  if (!c) { document.getElementById('client-view').innerHTML = '<div class="loading">No client data</div>'; return; }
  const rent = allListings.filter(l=>l.listing_type==='rent');
  const sale = allListings.filter(l=>l.listing_type==='sale');
  const avail = allListings.filter(l=>l.status==='available').length;
  const rentVal = rent.reduce((s,l)=>s+parseFloat(l.price||0),0);
  const saleVal = sale.reduce((s,l)=>s+parseFloat(l.price||0),0);

  document.getElementById('client-view').innerHTML = `
    <div class="client-card">
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px">
        <div class="client-avatar">M</div>
        <div>
          <div style="font-size:17px;font-weight:600">${c.name}</div>
          <div style="font-size:11px;color:var(--gold);margin-top:2px">${c.company||''}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.06em">${c.type||''}</div>
        </div>
      </div>
      <div style="height:1px;background:var(--border);margin-bottom:12px"></div>
      <div class="grid-2" style="margin-bottom:12px">
        <div class="mini-stat"><div class="mini-stat-n">${allListings.length}</div><div class="mini-stat-l">Total Listings</div></div>
        <div class="mini-stat"><div class="mini-stat-n" style="color:var(--green)">${avail}</div><div class="mini-stat-l">Available Now</div></div>
        <div class="mini-stat"><div class="mini-stat-n">${fmtBig(rentVal)}</div><div class="mini-stat-l">Rental Portfolio</div></div>
        <div class="mini-stat"><div class="mini-stat-n">${fmtBig(saleVal)}</div><div class="mini-stat-l">Sale Portfolio</div></div>
      </div>
      ${c.notes?`<div style="background:var(--bg);border-radius:8px;padding:10px 12px"><div class="label">Notes</div><div style="font-size:12px;color:#888;line-height:1.6">${c.notes}</div></div>`:''}
    </div>
    <div style="background:var(--surface);border:1px solid rgba(212,168,83,.2);border-radius:12px;padding:14px;background:#0F0D08">
      <div style="font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.08em;margin-bottom:5px">⏳ AWAITING FROM CLIENT</div>
      <div style="font-size:12px;color:#888;line-height:1.6">Property photos and videos. Tap any listing → Upload to add media.</div>
    </div>`;
}

// ── ACTIVITY ──────────────────────────────────────────────────────────────────
const ACT_TYPES = ['note','call','viewing','offer','update','document'];
const ACT_ICONS = { note:'📝', call:'📞', viewing:'🏠', offer:'💰', update:'🔄', document:'📄' };
let actType = 'note', actListingId = '';

function renderActivityForm() {
  const pills = ACT_TYPES.map(t =>
    `<button class="act-pill ${t===actType?'on':''}" onclick="setActType('${t}')">${ACT_ICONS[t]} ${t}</button>`
  ).join('');
  const opts = allListings.map(l =>
    `<option value="${l.id}">${l.name}${l.unit?' #'+l.unit:''} (${l.listing_type})</option>`
  ).join('');

  document.getElementById('act-form').innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px">
      <div class="label">Log Activity</div>
      <div class="act-types">${pills}</div>
      <select class="input" style="margin-bottom:8px" onchange="actListingId=this.value">
        <option value="">No specific listing</option>
        ${opts}
      </select>
      <textarea class="input" id="act-body" rows="3" placeholder="What happened?" style="margin-bottom:8px;line-height:1.6"></textarea>
      <button class="btn btn-primary" style="width:100%" onclick="addActivity()">Log Entry</button>
    </div>`;
}

function setActType(t) {
  actType = t;
  renderActivityForm();
}

async function addActivity() {
  const body = document.getElementById('act-body')?.value?.trim();
  if (!body || !allClient) return;
  await api('/rest/v1/activity_log', {
    method: 'POST',
    headers: { ...HDR, 'Prefer':'return=minimal' },
    body: JSON.stringify({ client_id: allClient.id, listing_id: actListingId||null, activity_type: actType, body })
  });
  renderActivityForm();
  loadActivityLog();
}

async function loadActivityLog() {
  if (!allClient) return;
  const log = await api(`/rest/v1/activity_log?client_id=eq.${allClient.id}&select=*,listings(name,unit)&order=created_at.desc`);
  if (!log?.length) {
    document.getElementById('act-log').innerHTML = '<div style="text-align:center;color:var(--sub);font-size:12px;padding:24px 0">No activity logged yet</div>';
    return;
  }
  document.getElementById('act-log').innerHTML = log.map(e => {
    const d = new Date(e.created_at);
    const ds = d.toLocaleDateString('en-GB',{day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    return `
      <div class="act-entry">
        <div class="act-entry-top">
          <div style="display:flex;align-items:center">
            <span>${ACT_ICONS[e.activity_type]||'•'}</span>
            <span class="act-type-label" style="margin-left:6px">${e.activity_type}</span>
            ${e.listings?`<span class="act-listing">· ${e.listings.name}${e.listings.unit?' #'+e.listings.unit:''}</span>`:''}
          </div>
          <span class="act-date">${ds}</span>
        </div>
        <div class="act-body">${e.body}</div>
      </div>`;
  }).join('');
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function switchTab(t) {
  currentTab = t;
  ['listings','client','activity'].forEach(id => {
    document.getElementById('tab-'+id).style.display = id===t ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    const tabs = ['listings','client','activity'];
    el.className = 'tab ' + (tabs[i]===t?'on':'off');
  });
}

function switchSub(s) {
  currentSub = s;
  document.querySelectorAll('.subtab').forEach((el,i) => {
    el.className = 'subtab ' + (['rent','sale'][i]===s?'on':'off');
  });
  renderListings();
}

// close modal on backdrop click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

loadAll();
</script>
</body>
</html>
